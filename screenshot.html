<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screenshot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
    }
    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0.6;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #selection {
      position: fixed;
      border: 2px solid #6366f1;
      background: rgba(99, 102, 241, 0.1);
      display: none;
      z-index: 2;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
    }
    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      z-index: 3;
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    #size-info {
      position: fixed;
      color: #fff;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-size: 12px;
      z-index: 3;
      background: rgba(99, 102, 241, 0.8);
      padding: 4px 10px;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <img id="bg" />
  <canvas id="overlay"></canvas>
  <div id="selection"></div>
  <div id="hint">拖拽选择截图区域，按 ESC 取消</div>
  <div id="size-info"></div>
  <script src="screenshot.js"></script>
</body>
</html>
