<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remix Mini</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="drag-region" id="dragRegion">
      <span class="title">REMIX MINI</span>
      <span class="version" id="versionDisplay"></span>
    </div>
    <div class="content">
      <div class="left-panel">
        <button class="btn-screenshot" id="btnPaste" title="粘贴截图 (Ctrl+V)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1"/>
          </svg>
        </button>
        <button class="btn-screenshot" id="btnScreenshot" title="截图">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M3 9h2M19 9h2M9 3v2M9 19v2"/>
          </svg>
        </button>
        <div class="thumbnail-container" id="thumbnailContainer" style="display:none;">
          <img id="thumbnail" class="thumbnail" />
        </div>
      </div>
      <div class="right-panel">
        <input type="text" class="prompt-input" id="promptInput" placeholder="输入提示词..." />
        <button class="btn-generate" id="btnGenerate" title="生成">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
        <button class="btn-settings" id="btnSettings" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
      <button class="btn-close" id="btnClose" title="关闭">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status"></div>
    <div class="history-container" id="historyContainer"></div>
    <div class="balance-display" id="balanceDisplay"></div>
  </div>

  <!-- Settings Bar -->
  <div class="settings-bar" id="settingsBar" style="display:none;">
    <button class="settings-close" id="settingsClose" title="关闭">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="api-selector">
      <button class="api-option" id="apiGemini" data-type="gemini">PRO</button>
      <button class="api-option" id="apiAgnes" data-type="agnes">FREE</button>
    </div>
    <div class="api-key-section" id="apiKeySection">
      <input type="text" id="apiKeyInput" class="settings-input" placeholder="输入 API Key..." />
      <button class="btn-paste-small" id="btnPasteKey" title="粘贴">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
      </button>
    </div>
    <button class="btn-save" id="btnSave">保存</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
